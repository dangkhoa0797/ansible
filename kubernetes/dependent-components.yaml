---
- hosts: all
  become: true
  tasks:
  - name: update datetime
    shell: |
      sudo apt update
      DEBIAN_FRONTEND='noninteractive' apt-get -y -o Dpkg::Options::='--force-confdef' -o Dpkg::Options::='--force-confold' upgrade
      DEBIAN_FRONTEND='noninteractive' apt-get -y -o Dpkg::Options::='--force-confdef' -o Dpkg::Options::='--force-confold' dist-upgrade
      timedatectl set-timezone Asia/Ho_Chi_Minh
      hwclock --hctosys
      hwclock --systohc
      timedatectl set-ntp on

  - name: Install packages that allow apt to be used over HTTPS
    apt:
      name: "{{ packages }}"
      state: present
      update_cache: yes
    vars:
      packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
      - software-properties-common
      - gnupg2
      - nfs-common
      - httpie
      - net-tools

  - name: disable ufw
    shell: systemctl disable --now ufw

  - name: config containerd
    shell: |
      cat > /etc/modules-load.d/containerd.conf <<EOF
      overlay
      br_netfilter
      EOF
    tags: cat1
  - name: app config containerd
    shell: |
      modprobe overlay
      modprobe br_netfilter
    tags: s2

  - name: config kubernetes
    shell: |
      cat >/etc/sysctl.d/kubernetes.conf<<EOF
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables  = 1
      net.ipv4.ip_forward                 = 1
      EOF
    tags: cat2

  - name: app config kubernetes
    shell: sudo sysctl --system

  - name: Add an apt signing key for Docker
    apt_key:
      url: https://download.docker.com/linux/ubuntu/gpg
      state: present

  - name: Add apt repository for stable version
    apt_repository:
      repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu xenial stable
      state: present

  - name: Install docker and its dependecies
    apt: 
      name: "{{ packages }}"
      state: present
      update_cache: yes
    vars:
      packages:
      - containerd.io
  - name: config containerd 2
    shell: |
      mkdir -p /etc/containerd
      containerd config default > /etc/containerd/config.toml
      sudo sed -i 's/SystemdCgroup \= false/SystemdCgroup \= true/g' /etc/containerd/config.toml
    tags: s3

  - name: restart containerd
    shell: |
      systemctl restart containerd
      systemctl enable containerd
    tags: s3

  - name: Remove swapfile from /etc/fstab
    mount:
      name: "{{ item }}"
      fstype: swap
      state: absent
    with_items:
      - swap
      - none

  - name: Disable swap
    command: swapoff -a
    when: ansible_swaptotal_mb > 0

  - name: Add an apt signing key for Kubernetes
    apt_key:
      url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
      state: present

  - name: Adding apt repository for Kubernetes
    apt_repository:
      repo: deb https://apt.kubernetes.io/ kubernetes-xenial main
      state: present
      filename: kubernetes.list

  - name: Install Kubernetes binaries
    apt: 
      name: "{{ packages }}"
      state: present
      update_cache: yes
    vars:
      packages:
        - kubelet 
        - kubeadm 
        - kubectl

  - name: pin their version
    shell: sudo apt-mark hold kubelet kubeadm kubectl

  - name: enable kubelet
    shell: sudo systemctl enable kubelet       