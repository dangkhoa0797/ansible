---
- hosts: master
  become: true
  ignore_unreachable: yes
  ignore_errors: yes
  tasks:

  - name: pull images
    shell: kubeadm config images pull
  - name: Initialize the Kubernetes cluster using kubeadm
    shell: kubeadm init
    tags: init

  - name: Setup kubeconfig for  user
    shell: "{{ item }}"
    with_items:
      - mkdir -p $HOME/.kube
      - sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
    tags: s1

  - name: Setup kubeconfig for  user 2
    shell: sudo chown $(id -u):$(id -g) $HOME/.kube/config
    tags: s2

  - name: Generate join command
    shell: kubeadm token create --print-join-command
    register: join_command
    tags: s3

  - name: Copy join command to local file
    local_action: copy content="{{ join_command.stdout_lines[0] }}" dest="./join-command"
    tags: s3

  - name: Install calico pod network
    shell: |
      curl https://projectcalico.docs.tigera.io/manifests/calico.yaml -O
      kubectl apply -f calico.yaml
    tags: s4

  - name: alias
    shell: |
      printf "
      alias k='kubectl'" >> .bashrc
      source ~/.bashrc
    tags: alias

  - name: Install helm
    shell: |
      curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
      chmod 700 get_helm.sh
      ./get_helm.sh

  - name: Create secret docker-registry dockerhubdtttvn
    command: kubectl create secret docker-registry dockerhubdtttvn --docker-server=dockerhub.dttt.vn --docker-username=admin --docker-password=Trinam@2019 --docker-email=admin@trinam.com.vn
    tags: dockerhubdtttvn