---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificationapi-deployment
spec:
  selector:
    matchLabels:
      app: notificationapi
  replicas: 1
  template:
    metadata:
      labels:
        app: notificationapi
    spec:
      containers:
        - name: notificationapi
          image: dockerhub.dttt.vn/core/notification.api:5.1
          imagePullPolicy: Always
          env:
          - name: SCOPE__ENVIRONMENT
            value: "Test"
          - name: SCOPE__NAME
            value: "U2210"
          - name: ETCD__CONFIG
            value: "authenticated=true;server=http://10.0.68.171:2379;username=root;password=123456a@"
      imagePullSecrets:
      - name: dockerhubdtttvn

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notificationapi
spec:
  ports:
    - port: 80
  selector:
    app: notificationapi