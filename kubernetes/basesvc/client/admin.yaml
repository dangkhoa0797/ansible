---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminclient-deployment
spec:
  selector:
    matchLabels:
      app: adminclient
  replicas: 1
  template:
    metadata:
      labels:
        app: adminclient
    spec:
      containers:
        - name: adminclient
          image: dockerhub.dttt.vn/u202001/admin.client:5.1
          env:
          - name: BASE_HREF
            value: "/adminv5"
          - name: APP_CODE
            value: "ADMIN"
          - name: CONFIG_SERVICE
            value: ""
          ports:
            - containerPort: 80
          volumeMounts:
          - mountPath: /usr/share/nginx/html/assets/environments/
            name: client-data
      imagePullSecrets:
      - name: dockerhubdtttvn
      volumes:
        - name: client-data
          hostPath: # hostPath volume
            path: /volumes/client-data/
---
apiVersion: v1
kind: Service
metadata:
  name: adminclient-service
  labels:
    app: adminclient
spec:
  ports:
    - port: 80
  selector:
    app: adminclient