---
- hosts: nfsserver
  become: true
  ignore_unreachable: yes
  ignore_errors: yes
  tasks:
    - name: set up date time
      shell: |
        timedatectl set-timezone Asia/Ho_Chi_Minh
        hwclock --hctosys
        hwclock --systohc
        timedatectl set-ntp on
    - name: utility present debian-like
      ansible.builtin.apt:
        name:
          - nfs-kernel-server
        state: present
        update_cache: yes
    - name: nfs server folder
      shell: |
        mkdir -p /nfs_volumes
        chmod -R 777 /nfs_volumes/
        echo "/nfs_volumes *(rw,sync,no_subtree_check,no_root_squash,insecure)">>/etc/exports
        sudo exportfs -rv
        showmount -e
        systemctl restart nfs-kernel-server rpcbind

#    - name: mount client
#      shell: |
#        sudo apt install nfs-common
#        mount -t nfs 192.168.253.141:/nfs_volumes /mnt
#      delegate_to: nfs_client
    - name: apply on master
      shell: kubectl apply -f ./ansible/kubernetes/nfs-volumes/1nfs.yaml -f ./ansible/kubernetes/nfs-volumes/2nfs.yaml -f ./ansible/kubernetes/nfs-volumes/3nfs.yaml -f ./ansible/kubernetes/nfs-volumes/4nfs.yaml
      delegate_to: master1