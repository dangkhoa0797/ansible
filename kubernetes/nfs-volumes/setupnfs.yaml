---
- hosts: nfs
  become: true
  ignore_unreachable: yes
  ignore_errors: yes
  tasks:
    - name: set up date time
      shell: |
        timedatectl set-timezone Asia/Ho_Chi_Minh
        hwclock --hctosys
        hwclock --systohc
        timedatectl set-ntp on
    - name: nfs server
      shell: |
        sudo apt install nfs-kernel-server
        mkdir -p /nfs_volumes
        chmod -R 777 /nfs_volumes/
        echo "/nfs_volumes *(rw,sync,no_subtree_check,no_root_squash,insecure)">>/etc/exports
        sudo exportfs -rv
        showmount -e
        systemctl restart nfs-kernel-server rpcbind

#    - name: mount client
#      shell: |
#        sudo apt install nfs-common
#        mount -t nfs IP_NFS_SERVER:/nfs_volumes /mnt
#      delegate_to: nfs_client
    - name: apply on master
      shell: kubectl apply -f kubernetes/nfs-volumes/1nfs.yaml -f kubernetes/nfs-volumes/2nfs.yaml -f kubernetes/nfs-volumes/3nfs.yaml -f kubernetes/nfs-volumes/4nfs.yaml
      delegate_to: master