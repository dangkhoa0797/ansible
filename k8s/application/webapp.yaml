---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: volumesclient-pvc
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 10Gi
  hostPath:
    path: /volumes/volumesclient/
---
apiVersion: v1
kind: PersistentVolumeClaim
